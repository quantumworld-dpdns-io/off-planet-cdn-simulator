name: Rust
on:
  push:
    branches: [main]
    paths: ['edge/**']
  pull_request:
    paths: ['edge/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: edge
      - run: cd edge && cargo fmt --check
      - run: cd edge && cargo clippy -- -D warnings
      - run: cd edge && cargo test
