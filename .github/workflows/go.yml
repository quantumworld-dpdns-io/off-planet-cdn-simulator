name: Go
on:
  push:
    branches: [main]
    paths: ['services/**', 'packages/sdk-go/**', 'go.work']
  pull_request:
    paths: ['services/**', 'packages/sdk-go/**', 'go.work']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go vet ./services/...
      - run: go test ./services/... -count=1 -race
