name: Web
on:
  push:
    branches: [main]
    paths: ['apps/web/**', 'packages/sdk-js/**', 'packages/shared-schemas/**']
  pull_request:
    paths: ['apps/web/**', 'packages/sdk-js/**', 'packages/shared-schemas/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm lint
      - run: pnpm test
