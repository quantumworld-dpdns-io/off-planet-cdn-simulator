version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - offplanet
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - offplanet
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
    volumes:
      - ./infra/otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - offplanet
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - offplanet
    profiles:
      - ai
    restart: unless-stopped

networks:
  offplanet:
    driver: bridge

volumes:
  redis-data:
  qdrant-data:
  ollama-data:
